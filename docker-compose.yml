version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: smart-soil-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: smart-soil-advisory
    volumes:
      - mongodb_data:/data/db
    networks:
      - smart-soil-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smart-soil-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - MONGO_URI=mongodb://mongodb:27017/smart-soil-advisory
      - AI_SERVICE_URL=http://ai-service:8000
    depends_on:
      - mongodb
      - ai-service
    volumes:
      - ./backend/uploads:/app/uploads
    networks:
      - smart-soil-network

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: smart-soil-ai-service
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=production
    networks:
      - smart-soil-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: smart-soil-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - smart-soil-network

volumes:
  mongodb_data:

networks:
  smart-soil-network:
    driver: bridge
